<nav class="site-nav">
    <div class="nav-inner">
        <a href="{{ site.Home.RelPermalink }}" class="logo"><span>&gt;</span> crest</a>
        <button class="hamburger" aria-label="Toggle menu">&#9776;</button>
        <ul class="nav-links">
            {{ range .Site.Menus.main }}
                {{ if .Params.external }}
                    <li><a href="{{ .URL }}" class="nav-cta" target="_blank" rel="noopener">{{ .Name }}</a></li>
                {{ else }}
                    <li><a href="{{ .URL | relURL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a></li>
                {{ end }}
            {{ end }}
        </ul>
    </div>
</nav>
